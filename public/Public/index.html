<!DOCTYPE html>
<html>
<head>
  <title>BTC Wallet</title>
  <style>
    body{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
    .box{background:rgba(255,255,255,0.1);padding:40px;border-radius:20px;text-align:center;width:350px}
    input{width:100%;padding:15px;margin:10px 0;border-radius:10px;border:none}
    button{width:100%;padding:15px;background:#f7931a;border:none;border-radius:10px;color:#fff;font-size:16px;cursor:pointer}
    h1{margin-bottom:10px}
  </style>
</head>
<body>
  <div class="box">
    <h1>🟠 BTC Wallet</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>
  </div>
<script>
async function signup(){
  const email=document.getElementById('email').value;
  const password=document.getElementById('password').value;
  const res=await fetch('/api/signup',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email,password})
  });
  const data=await res.json();
  alert(data.success?'Account created!':'Error');
}
</script>
</body>
</html>
